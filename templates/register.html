<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">

    <script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/static/sw.js");
    }
    </script>
    <title>Register | Sudoku Game</title>
   <style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #000000, #121212);
    font-family: 'Inter', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
}


.auth-card {
    width: 360px;
    padding: 32px;
    background: #0f0f0f;
    border-radius: 14px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    text-align: center;
}

.auth-card h2 {
    margin-bottom: 6px;
}

.auth-card p {
    font-size: 14px;
    opacity: 0.75;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 14px;
    background: #000;
    border: 1px solid #333;
    color: #fff;
    border-radius: 8px;
    font-size: 15px;
}

input:focus {
    outline: none;
    border-color: #4da6ff;
    box-shadow: 0 0 0 1px #4da6ff;
}

button {
    width: 100%;
    padding: 12px;
    background: #4da6ff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    color: black;
}

button:hover {
    background: #3399ff;
}

.auth-link {
    margin-top: 18px;
    font-size: 14px;
}

.auth-link a {
    color: #4da6ff;
    text-decoration: none;
}

.error {
    background: #330000;
    color: #ff8080;
    padding: 10px;
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 14px;
}

</style>

</head>
<body>


<div class="auth-card">
    <h2>Create Account</h2>
    <p>Start solving Sudoku challenges</p>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Register</button>
    </form>

    <div class="auth-link">
        Already have an account? <a href="/login">Login</a>
    </div>
</div>


</body>
</html>
