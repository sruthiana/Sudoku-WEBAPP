<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Sudoku</title>
        <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">

    <script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/static/sw.js");
    }
    </script>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            margin: 0;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reset-box {
            background: #111;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.15);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: black;
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: white;
            color: black;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #ddd;
        }

        p {
            margin-top: 15px;
            font-size: 14px;
        }

        a {
            color: #4da6ff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="reset-box">
        <h2>Reset Password</h2>

        <form method="POST" action="/reset-password">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="New Password" required>

            <button type="submit">Reset Password</button>
        </form>

        <p>
            <a href="/login">Back to Login</a>
        </p>
    </div>

</body>
</html>
